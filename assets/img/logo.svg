<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 98" role="img" aria-label="Studio GOODLOOK">
  <!-- Background -->
  <rect width="310" height="98" rx="3" fill="#404268"/>

  <!-- Border frame — top line split at center to let scissors sit on it -->
  <line x1="9"   y1="14" x2="136"  y2="14" stroke="#CBA76B" stroke-width="1.2"/>
  <line x1="174" y1="14" x2="301"  y2="14" stroke="#CBA76B" stroke-width="1.2"/>
  <line x1="9"   y1="88" x2="301"  y2="88" stroke="#CBA76B" stroke-width="1.2"/>
  <line x1="9"   y1="14" x2="9"    y2="88" stroke="#CBA76B" stroke-width="1.2"/>
  <line x1="301" y1="14" x2="301"  y2="88" stroke="#CBA76B" stroke-width="1.2"/>

  <!-- Scissors centred on the top border line at x=155, y=14 -->
  <g transform="translate(155 14)" stroke="#CBA76B" fill="none" stroke-linecap="round">
    <!-- Left blade (/ diagonal) -->
    <line x1="-13" y1="-20" x2="11" y2="12" stroke-width="2.6"/>
    <!-- Right blade (\ diagonal) -->
    <line x1="13"  y1="-20" x2="-11" y2="12" stroke-width="2.6"/>
    <!-- Pivot rivet -->
    <circle cx="0" cy="-3" r="3"   fill="#CBA76B" stroke="none"/>
    <circle cx="0" cy="-3" r="1.3" fill="#404268"/>
  </g>

  <!-- GOOD LOOK -->
  <text
    x="155" y="65"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="27"
    font-weight="700"
    fill="#CBA76B"
    text-anchor="middle"
    letter-spacing="7">GOOD LOOK</text>
</svg>
